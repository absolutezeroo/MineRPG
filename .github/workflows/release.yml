name: Release

on:
  push:
    tags:
      - "v*"

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore MineRPG.sln

      - name: Build (Release)
        run: dotnet build MineRPG.sln -c Release --no-restore

      - name: Run tests
        run: >
          dotnet test src/MineRPG.Tests/MineRPG.Tests.csproj
          -c Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG="${{ steps.version.outputs.VERSION }}"

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            echo "Generating changelog for all commits up to ${CURRENT_TAG}"
          else
            RANGE="${PREV_TAG}..HEAD"
            echo "Generating changelog from ${PREV_TAG} to ${CURRENT_TAG}"
          fi

          # Generate grouped changelog from conventional commits
          {
            echo "CHANGELOG<<CHANGELOG_EOF"

            echo "## What's Changed"
            echo ""

            # Features
            FEATS=$(git log "$RANGE" --pretty=format:"%s" --grep="^feat" 2>/dev/null || true)
            if [ -n "$FEATS" ]; then
              echo "### New Features"
              echo "$FEATS" | sed 's/^feat\(([^)]*)\)\?: /- /' | sed 's/^feat: /- /'
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$RANGE" --pretty=format:"%s" --grep="^fix" 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | sed 's/^fix\(([^)]*)\)\?: /- /' | sed 's/^fix: /- /'
              echo ""
            fi

            # Performance
            PERFS=$(git log "$RANGE" --pretty=format:"%s" --grep="^perf" 2>/dev/null || true)
            if [ -n "$PERFS" ]; then
              echo "### Performance"
              echo "$PERFS" | sed 's/^perf\(([^)]*)\)\?: /- /' | sed 's/^perf: /- /'
              echo ""
            fi

            # Refactors
            REFS=$(git log "$RANGE" --pretty=format:"%s" --grep="^refactor" 2>/dev/null || true)
            if [ -n "$REFS" ]; then
              echo "### Refactoring"
              echo "$REFS" | sed 's/^refactor\(([^)]*)\)\?: /- /' | sed 's/^refactor: /- /'
              echo ""
            fi

            # Other
            OTHERS=$(git log "$RANGE" --pretty=format:"%s" --grep="^docs\|^chore\|^build\|^ci\|^test\|^style" 2>/dev/null || true)
            if [ -n "$OTHERS" ]; then
              echo "### Other Changes"
              echo "$OTHERS" | sed 's/^[a-z]*\(([^)]*)\)\?: /- /' | sed 's/^[a-z]*: /- /'
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${CURRENT_TAG}"

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
